<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrackpot AIGC</title>
    <link rel="preload" href="Pic/bg.mp4" as="video" type="video/mp4">
    <link rel="preload" href="Pic/头像.jpg" as="image">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
    <script>
        document.documentElement.classList.add('intro-loading', 'intro-prestart', 'hover-prewarm', 'hover-suppressed');
        if ('scrollRestoration' in history) {
            history.scrollRestoration = 'manual';
        }
        window.__returnToAbout = sessionStorage.getItem('returnToAbout') === '1';

        if (!window.__returnToAbout && /^#(about|skills|projects|contact)$/i.test(window.location.hash) && history.replaceState) {
            history.replaceState(null, '', window.location.pathname + window.location.search);
        }
    </script>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory; /* 恢复整屏强制吸附，避免半屏停留 */
            scrollbar-gutter: stable;
        }
        body {
            font-family: 'Noto Serif SC', serif;
            background: #000000; /* 将背景颜色改为黑色 */
            color: #ffffff; /* 全局文字颜色改为白色 */
            line-height: 1.6;
            overflow-x: hidden;
            overflow-y: scroll;
            --motion-smooth-reveal: cubic-bezier(0.22, 0.76, 0.24, 1);
            --motion-smooth-slide: cubic-bezier(0.24, 0.72, 0.26, 1);
            --motion-smooth-mask: cubic-bezier(0.26, 0.78, 0.22, 1);
            --motion-smooth-fade: cubic-bezier(0.3, 0.06, 0.24, 1);
        }
        html.intro-loading,
        html.intro-loading body {
            overflow: hidden;
        }

        .startup-loader {
            position: fixed;
            inset: 0;
            z-index: 4000;
            overflow: hidden;
            background: transparent;
            pointer-events: auto;
        }
        .startup-loader[hidden] {
            display: none;
        }
        .startup-loader-panel {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            background: #000000;
            transition: transform 0.82s var(--motion-smooth-reveal);
            will-change: transform;
        }
        .startup-loader-copy {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.92);
            font-size: 0.82rem;
            letter-spacing: 0.34em;
            text-transform: uppercase;
            white-space: nowrap;
            pointer-events: none;
        }
        .startup-loader-copy-loading {
            bottom: clamp(8px, 2.4vh, 22px);
        }
        .startup-loader-copy-progress {
            top: clamp(8px, 2.4vh, 22px);
            letter-spacing: 0.18em;
        }
        .startup-loader-panel-top {
            top: 0;
        }
        .startup-loader-panel-bottom {
            bottom: 0;
        }
        .startup-loader-progress {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 1px;
            transform: translate(-50%, -50%);
            transform-origin: center;
            transition: opacity 0.22s var(--motion-smooth-fade), transform 0.22s var(--motion-smooth-fade);
        }
        .startup-loader-progress-fill {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #ffffff;
            transform: scaleX(var(--loader-progress-visual, 0));
            transition: transform 0.28s var(--motion-smooth-fade);
            will-change: transform;
            transform-origin: center;
        }
        .startup-loader.is-complete .startup-loader-progress {
            opacity: 0;
            transform: translate(-50%, -50%) scaleX(1);
        }
        .startup-loader.is-opening {
            pointer-events: none;
        }
        .startup-loader.is-opening .startup-loader-panel-top {
            transform: translateY(-100%);
        }
        .startup-loader.is-opening .startup-loader-panel-bottom {
            transform: translateY(100%);
        }

        /* 全屏模块样式 */
        .fullscreen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 40px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
            scroll-snap-align: start; /* 每个模块吸附到顶部 */
            scroll-snap-stop: always; /* 每次滚动都稳定停在完整分屏上 */
        }

        /* 标题样式 */
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        h2 {
            font-size: 2.5rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            max-width: 800px;
        }

        /* 按钮样式 */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: transparent;
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid #333333;
            border-radius: 0; /* 改为直角边 */
            text-decoration: none;
            font-weight: 700;
            margin-top: 20px;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .btn:hover {
            background: #333333;
            color: #ffffff;
        }

        /* 导航栏样式 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            overflow: visible;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: transparent; /* 确保背景透明 */
            border: none; /* 移除边界 */
            box-shadow: none; /* 移除阴影 */
            font-family: 'Noto Serif SC', serif;
            font-weight: 300; /* 确保使用 Light 字重 */
        }
        .navbar::before {
            content: '';
            position: absolute;
            inset: 0 0 auto 0;
            height: 80px;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.28) 48%, rgba(0, 0, 0, 0) 100%);
        }
        .navbar > * {
            position: relative;
            z-index: 2;
        }
        .navbar .logo {
            font-size: 1rem;
            font-weight: 300; /* 确保名字使用 Light 字重 */
            color: #ffffff; /* 导航栏文字颜色改为白色 */
            opacity: 0.6;
            transition: color 0.3s ease, opacity 0.3s ease;
        }
        .navbar .logo:hover {
            opacity: 1;
        }

        /* 导航栏文字样式修复 */
        .navbar a {
            text-decoration: none; /* 移除下划线 */
            color: #ffffff;
            font-weight: 300; /* 确保导航链接使用 Light 字重 */
            margin: 0 15px;
            opacity: 0.6;
            transition: color 0.3s ease, opacity 0.3s ease;
        }
        .navbar a:hover {
            color: #ffffff;
            opacity: 1;
        }

        /* 导航栏文字动态颜色切换 */
        .navbar {
            transition: color 0.3s ease;
        }

        /* 欢迎页面文字和按钮样式 */
        #about {
            position: relative;
            overflow: hidden;
            --about-intro-shift: 168px;
            --about-text-intro-offset: 420px;
            --about-text-mask-offset: 400px;
            --about-text-overlap: 4px;
            --about-intro-delay: 0s;
            color: #ffffff !important; /* 强制设置文字为纯白色 */
        }
        .about-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
        }
        .safari-bg-video .about-video::-webkit-media-controls,
        .safari-bg-video .about-video::-webkit-media-controls-panel,
        .safari-bg-video .about-video::-webkit-media-controls-start-playback-button {
            display: none !important;
            -webkit-appearance: none;
        }
        #about::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.08) 28%, rgba(0, 0, 0, 0.22) 58%, rgba(0, 0, 0, 0.52) 100%);
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }
        #about::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1;
            opacity: 1;
            pointer-events: none;
        }
        html.intro-opening #about::before {
            animation: aboutVignetteReveal 0.9s var(--motion-smooth-fade) forwards;
        }
        html.intro-opening #about::after {
            animation: aboutBlackOverlayFade 0.9s var(--motion-smooth-fade) forwards;
        }
        html.intro-opened #about::before,
        html.intro-skip-complete #about::before,
        html.about-intro-playing #about::before {
            opacity: 1;
        }
        html.intro-opened #about::after,
        html.intro-skip-complete #about::after,
        html.about-intro-playing #about::after {
            opacity: 0;
        }
        @keyframes aboutVignetteReveal {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
        @keyframes aboutBlackOverlayFade {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }
        #about > div {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: left;
            z-index: 2; /* 提升文字层级，确保文字位于蒙层之上 */
        }
        .about-header {
            position: relative;
            display: flex;
            align-items: stretch;
            gap: 24px;
        }
        .about-avatar-trigger {
            position: relative;
            z-index: 2;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            background: transparent;
            border: 0;
            cursor: pointer;
            transform: translateX(var(--about-intro-shift));
            will-change: transform;
            perspective: 1200px;
            --avatar-hover-rotate-x: 0deg;
            --avatar-hover-rotate-y: 0deg;
            --avatar-card-base-rotate-y: 0deg;
        }
        .about-avatar-card {
            position: relative;
            z-index: 1;
            width: 140px;
            height: 140px;
            transform-origin: center center;
            transform-style: preserve-3d;
            transform: rotateX(var(--avatar-hover-rotate-x)) rotateY(calc(var(--avatar-card-base-rotate-y) + var(--avatar-hover-rotate-y)));
            transition: transform 0.28s var(--motion-smooth-slide);
            will-change: transform;
        }
        .about-avatar-trigger.is-flipped .about-avatar-card {
            --avatar-card-base-rotate-y: 180deg;
        }
        .about-avatar-face {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .about-avatar-face-back {
            transform: rotateY(180deg);
        }
        .about-avatar-trigger::after {
            content: '';
            position: absolute;
            inset: -18px;
            z-index: 0;
            background:
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.62) 0%, rgba(222, 255, 252, 0.42) 18%, rgba(120, 255, 244, 0.22) 42%, rgba(43, 255, 239, 0.08) 60%, rgba(43, 255, 239, 0) 78%),
                linear-gradient(135deg, rgba(220, 255, 252, 0.22), rgba(70, 255, 243, 0.1) 52%, rgba(70, 255, 243, 0.02));
            filter: blur(10px) saturate(1.12);
            opacity: 0;
            transform: translateY(3px) scale(0.96);
            transition: opacity 0.25s ease, transform 0.25s ease, filter 0.25s ease;
            pointer-events: none;
            will-change: opacity, transform, filter;
        }
        .about-avatar {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            object-fit: cover;
            flex-shrink: 0;
            border: 5px solid #ffffff;
            transform: translateY(3px) scale(1);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18), 0 3px 3px rgba(0, 0, 0, 0.22), 0 4px 12px rgba(6, 28, 34, 0.18);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            will-change: transform, box-shadow, border-color;
        }
        .about-avatar-qr {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 5px solid rgba(255, 255, 255, 0.94);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18), 0 3px 3px rgba(0, 0, 0, 0.22), 0 4px 12px rgba(6, 28, 34, 0.18);
        }
        .about-avatar-trigger:hover::after,
        .about-avatar-trigger.is-hover-active::after,
        .about-avatar-trigger:focus-visible::after {
            opacity: 0.68;
            transform: translateY(3px) scale(1.05);
            filter: blur(9px) brightness(1.18) saturate(1.2);
            animation: auroraGlowBreath 4.8s ease-in-out infinite;
        }
        .about-avatar-trigger.is-flipped::after {
            opacity: 0.18;
            animation: none;
        }
        .about-avatar-trigger:hover .about-avatar,
        .about-avatar-trigger.is-hover-active .about-avatar,
        .about-avatar-trigger:focus-visible .about-avatar {
            transform: translateY(3px) scale(1.04);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.24), 0 0 22px rgba(170, 255, 249, 0.34), 0 0 42px rgba(56, 255, 240, 0.26);
            border-color: rgba(255, 255, 255, 1);
        }
        .about-avatar-trigger.is-flipped:hover .about-avatar,
        .about-avatar-trigger.is-flipped.is-hover-active .about-avatar,
        .about-avatar-trigger.is-flipped:focus-visible .about-avatar {
            transform: translateY(3px) scale(1);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18), 0 3px 3px rgba(0, 0, 0, 0.22), 0 4px 12px rgba(6, 28, 34, 0.18);
            border-color: #ffffff;
        }
        .about-avatar-trigger:focus-visible {
            outline: none;
        }
        @keyframes auroraGlowBreath {
            0% {
                opacity: 0.52;
                transform: translateY(3px) scale(0.96);
                filter: blur(8px) brightness(1.04) saturate(1.08);
            }
            50% {
                opacity: 0.78;
                transform: translateY(3px) scale(1.08);
                filter: blur(11px) brightness(1.28) saturate(1.22);
            }
            100% {
                opacity: 0.62;
                transform: translateY(3px) scale(1.01);
                filter: blur(9px) brightness(1.14) saturate(1.14);
            }
        }
        .qr-modal {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.42);
            animation: qrModalFadeIn 0.26s ease forwards;
        }
        .qr-modal[hidden] {
            display: none;
        }
        .qr-modal-content {
            position: relative;
            background: transparent;
            animation: qrModalContentIn 0.34s cubic-bezier(0.2, 0.82, 0.2, 1) forwards;
            transform-origin: center;
        }
        .qr-modal-image {
            display: block;
            width: min(82vw, 360px);
            max-height: 82vh;
            object-fit: contain;
            border: 1px solid rgba(255, 255, 255, 0.2);
            filter: drop-shadow(0 24px 10px rgba(0, 0, 0, 0.6)) drop-shadow(0 10px 10px rgba(0, 0, 0, 0.36));
        }
        .qr-modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 2;
            width: 24px;
            height: 24px;
            border: 0;
            padding: 0;
            background: transparent;
            color: rgba(255, 255, 255, 0.95);
            font-size: 1rem;
            font-weight: 300;
            line-height: 1;
            cursor: pointer;
        }
        .qr-modal-close::before,
        .qr-modal-close::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 1px;
            background: currentColor;
            transform-origin: center;
        }
        .qr-modal-close::before {
            transform: translate(-50%, -50%) rotate(45deg);
        }
        .qr-modal-close::after {
            transform: translate(-50%, -50%) rotate(-45deg);
        }
        @keyframes qrModalFadeIn {
            0% {
                background: rgba(0, 0, 0, 0);
            }
            100% {
                background: rgba(0, 0, 0, 0.42);
            }
        }
        @keyframes qrModalContentIn {
            0% {
                opacity: 0;
                transform: translateY(18px) scale(0.94);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .about-text {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 140px;
            margin-left: calc(-1 * var(--about-text-overlap));
            overflow: visible;
            opacity: 0;
            transform: translateX(calc(-1 * var(--about-text-intro-offset)));
            clip-path: inset(-4px 0 -28px var(--about-text-mask-offset));
            will-change: opacity, transform, clip-path;
        }
        .about-name {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .about-name h1 {
            margin-bottom: 0;
            line-height: 1;
        }
        .about-name-cn {
            font-size: 1.9rem;
        }
        .about-name-en {
            font-size: 1.4rem;
        }
        .about-details {
            position: relative;
            display: flex;
            flex-direction: column;
            margin-top: auto;
            padding-top: 20px;
            gap: 4px;
        }
        .about-details::before {
            content: '';
            position: absolute;
            top: 13px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0.42) 55%, rgba(255, 255, 255, 0) 100%);
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.24)) drop-shadow(0 2px 5px rgba(6, 28, 34, 0.18));
        }
        .about-details p {
            font-size: 0.98rem;
            margin: 0;
            line-height: 1.2;
        }
        .about-detail-line {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .about-detail-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            color: rgba(255, 255, 255, 0.8);
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.3)) drop-shadow(0 2px 5px rgba(6, 28, 34, 0.2));
        }
        html.intro-loading .about-avatar-trigger,
        html.intro-prestart .about-avatar-trigger,
        html.intro-opening .about-avatar-trigger,
        html.about-intro-playing .about-avatar-trigger {
            pointer-events: none;
        }
        html.about-intro-playing .about-avatar-trigger {
            animation: aboutAvatarSlide 1.18s var(--motion-smooth-slide) var(--about-intro-delay) forwards;
        }
        html.about-intro-playing .about-text {
            animation:
                aboutTextSlide 1.18s var(--motion-smooth-slide) calc(var(--about-intro-delay) + 0.01s) forwards,
                aboutTextMaskReveal 1.02s var(--motion-smooth-mask) calc(var(--about-intro-delay) + 0.01s) forwards,
                aboutTextFadeIn 0.16s var(--motion-smooth-fade) calc(var(--about-intro-delay) + 0.01s) forwards;
        }
        html.intro-opened .about-avatar-trigger,
        html.intro-skip-complete .about-avatar-trigger {
            transform: translateX(0);
        }
        html.intro-opened .about-text,
        html.intro-skip-complete .about-text {
            opacity: 1;
            transform: translateX(0);
            clip-path: inset(-4px 0 -28px 0);
        }
        html.hover-prewarm .about-avatar-trigger::after {
            opacity: 0;
            transform: translateY(3px) scale(1.05) translateZ(0);
            filter: blur(9px) brightness(1.18) saturate(1.2);
            animation: auroraGlowBreath 4.8s ease-in-out infinite;
        }
        html.hover-prewarm .about-avatar-trigger::after {
            transition: none;
        }
        html.hover-suppressed .about-avatar-trigger:hover::after,
        html.hover-suppressed .about-avatar-trigger.is-hover-active::after,
        html.hover-suppressed .about-avatar-trigger:hover .about-avatar,
        html.hover-suppressed .about-avatar-trigger.is-hover-active .about-avatar {
            opacity: 0;
            animation: none;
        }
        html.hover-suppressed .about-avatar-trigger:hover::after,
        html.hover-suppressed .about-avatar-trigger.is-hover-active::after {
            transform: translateY(3px) scale(0.96);
            filter: blur(10px) saturate(1.12);
        }
        html.hover-suppressed .about-avatar-trigger:hover .about-avatar,
        html.hover-suppressed .about-avatar-trigger.is-hover-active .about-avatar {
            transform: translateY(3px) scale(1);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18), 0 3px 3px rgba(0, 0, 0, 0.22), 0 4px 12px rgba(6, 28, 34, 0.18);
            border-color: rgba(255, 255, 255, 0.6);
        }
        @keyframes aboutAvatarSlide {
            0% {
                transform: translateX(var(--about-intro-shift));
            }
            100% {
                transform: translateX(0);
            }
        }
        @keyframes aboutTextSlide {
            0% {
                transform: translateX(calc(-1 * var(--about-text-intro-offset)));
            }
            100% {
                transform: translateX(0);
            }
        }
        @keyframes aboutTextMaskReveal {
            0% {
                clip-path: inset(-4px 0 -28px var(--about-text-mask-offset));
            }
            100% {
                clip-path: inset(-4px 0 -28px 0);
            }
        }
        @keyframes aboutTextFadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
        #about h1, #about p {
            color: rgba(255, 255, 255, 0.8) !important; /* 确保标题和段落文字保持 80% 不透明度 */
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.28), 0 3px 3px rgba(0, 0, 0, 0.34), 0 4px 12px rgba(6, 28, 34, 0.28);
        }
        #about .btn {
            color: rgba(255, 255, 255, 0.8); /* 按钮文字保持 80% 不透明度 */
            border: 1px solid #ffffff; /* 按钮边框为白色 */
        }
        #about .btn:hover {

        <!-- JavaScript 逻辑以动态切换导航栏文字颜色 -->
        <script>
            const shouldReturnToAbout = window.__returnToAbout === true;
            const wheelScrollFactor = 0.62;
            const root = document.documentElement;
            const startupLoader = document.querySelector('.startup-loader');
            const aboutSection = document.querySelector('#about');
            const avatarTrigger = document.querySelector('.about-avatar-trigger');
            const avatarCard = document.querySelector('.about-avatar-card');
            const qrModal = document.querySelector('.qr-modal');
            const qrModalClose = document.querySelector('.qr-modal-close');
            const contactRevealButton = document.querySelector('#contact .btn[href="#about"]');
            const aboutVideo = document.querySelector('.about-video');
            const aboutAvatarImage = document.querySelector('.about-avatar');
            const aboutAvatarQrImage = document.querySelector('.about-avatar-qr');
            const qrModalImage = document.querySelector('.qr-modal-image');
            const startupLoaderProgressText = document.querySelector('.startup-loader-copy-progress');
            const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
            const introBootTimestamp = performance.now();
            const quickReadyThreshold = 120;
            const quickReadyMinimum = 300;
            const standardReadyMinimum = 650;
            const introMaxWait = 3000;
            const startupRevealDuration = 860;
            const aboutIntroDuration = 1180;
            const avatarContactFlipDuration = 880;
            const contactRevealScrollSettleFrames = 10;
            const fontReadyTimeout = 900;
            const avatarHoverRangeViewportRatio = 0.5;
            const avatarHoverMaxTiltDegrees = 90;
            const startupStepWeights = [0.58, 0.22, 0.11];
            const startupStepMilestones = startupStepWeights.reduce(function(milestones, weight) {
                const lastMilestone = milestones.length ? milestones[milestones.length - 1] : 0.08;
                milestones.push(lastMilestone + weight);
                return milestones;
            }, []);
            let baseLoaderProgress = 0.08;
            let targetLoaderProgress = 0.08;
            let renderedLoaderProgress = 0;
            let loaderProgressFrameId = 0;
            let loaderProgressFloatTimerId = 0;
            let startupTimeoutId = 0;
            let avatarContactRevealTimerId = 0;
            let avatarContactFlipAnimation = null;
            let avatarProgrammaticSpinInProgress = false;
            let startupPresentationFinished = false;
            let startupTimedOut = false;

            if (isSafari) {
                root.classList.add('safari-bg-video');
            }

            function getLoaderFloatTarget() {
                if (baseLoaderProgress >= 0.99) {
                    return baseLoaderProgress;
                }

                return Math.min(0.99, baseLoaderProgress + 0.035);
            }

            function stopLoaderFloat() {
                if (loaderProgressFloatTimerId) {
                    window.clearInterval(loaderProgressFloatTimerId);
                    loaderProgressFloatTimerId = 0;
                }
            }

            function startLoaderFloat() {
                stopLoaderFloat();
                loaderProgressFloatTimerId = window.setInterval(function() {
                    const floatTarget = getLoaderFloatTarget();

                    if (floatTarget > targetLoaderProgress) {
                        setLoaderProgress(floatTarget);
                    }
                }, 180);
            }

            function clearStartupTimeout() {
                if (startupTimeoutId) {
                    window.clearTimeout(startupTimeoutId);
                    startupTimeoutId = 0;
                }
            }

            function finalizeStartupWithoutAnimation() {
                if (startupPresentationFinished) {
                    return;
                }

                startupTimedOut = true;
                startupPresentationFinished = true;
                clearStartupTimeout();
                stopLoaderFloat();
                startupLoader.hidden = true;
                root.classList.remove('intro-loading', 'intro-prestart', 'intro-opening', 'hover-prewarm');
                root.classList.remove('about-intro-playing');
                root.classList.add('intro-opened', 'intro-skip-complete');
                warmQrModalAsset();
                armAvatarHoverAfterPointerMove();
            }

            function finishStartupPresentation() {
                if (startupPresentationFinished) {
                    return false;
                }

                startupPresentationFinished = true;
                clearStartupTimeout();
                return true;
            }

            function renderLoaderProgress() {
                const progressDelta = targetLoaderProgress - renderedLoaderProgress;

                if (Math.abs(progressDelta) < 0.001) {
                    renderedLoaderProgress = targetLoaderProgress;
                } else {
                    renderedLoaderProgress += progressDelta * 0.16;
                }

                root.style.setProperty('--loader-progress-visual', Math.min(renderedLoaderProgress / 0.99, 1).toFixed(3));

                if (startupLoaderProgressText) {
                    startupLoaderProgressText.textContent = Math.round(renderedLoaderProgress * 100) + '%';
                }

                if (Math.abs(targetLoaderProgress - renderedLoaderProgress) >= 0.001) {
                    loaderProgressFrameId = window.requestAnimationFrame(renderLoaderProgress);
                } else {
                    loaderProgressFrameId = 0;
                }
            }

            function setLoaderProgress(progressValue) {
                targetLoaderProgress = Math.max(0, Math.min(1, progressValue));

                if (!loaderProgressFrameId) {
                    loaderProgressFrameId = window.requestAnimationFrame(renderLoaderProgress);
                }
            }

            setLoaderProgress(0.08);
            startLoaderFloat();
            startupTimeoutId = window.setTimeout(finalizeStartupWithoutAnimation, introMaxWait);

            function waitForImage(imageElement) {
                return new Promise(function(resolve) {
                    if (!imageElement) {
                        resolve();
                        return;
                    }

                    const finishImageReady = function() {
                        if (typeof imageElement.decode === 'function') {
                            imageElement.decode().catch(function() {
                                return undefined;
                            }).finally(resolve);
                            return;
                        }

                        resolve();
                    };

                    if (imageElement.complete && imageElement.naturalWidth > 0) {
                        finishImageReady();
                        return;
                    }

                    imageElement.addEventListener('load', finishImageReady, { once: true });
                    imageElement.addEventListener('error', resolve, { once: true });
                });
            }

            function waitForVideo(videoElement) {
                return new Promise(function(resolve) {
                    if (!videoElement) {
                        resolve();
                        return;
                    }

                    const finishVideoReady = function() {
                        const playPromise = videoElement.play();

                        if (playPromise && typeof playPromise.catch === 'function') {
                            playPromise.catch(function() {
                                return undefined;
                            });
                        }

                        resolve();
                    };

                    if (videoElement.readyState >= HTMLMediaElement.HAVE_CURRENT_DATA) {
                        finishVideoReady();
                        return;
                    }

                    videoElement.addEventListener('loadeddata', finishVideoReady, { once: true });
                    videoElement.addEventListener('error', resolve, { once: true });
                });
            }

            function waitForFonts() {
                if (!document.fonts || typeof document.fonts.ready === 'undefined') {
                    return Promise.resolve();
                }

                return Promise.race([
                    document.fonts.ready.catch(function() {
                        return undefined;
                    }),
                    new Promise(function(resolve) {
                        window.setTimeout(resolve, fontReadyTimeout);
                    })
                ]);
            }

            function warmQrModalAsset() {
                const assignAssetImage = function(imageElement) {
                    if (!imageElement || (imageElement.complete && imageElement.naturalWidth > 0)) {
                        return;
                    }

                    const imageSource = imageElement.dataset.src;

                    if (!imageSource || imageElement.getAttribute('src')) {
                        return;
                    }

                    imageElement.decoding = 'async';
                    imageElement.loading = 'eager';
                    imageElement.src = imageSource;
                };

                const assignQrAssets = function() {
                    assignAssetImage(qrModalImage);
                    assignAssetImage(aboutAvatarQrImage);
                };

                if ('requestIdleCallback' in window) {
                    window.requestIdleCallback(function() {
                        assignQrAssets();
                    }, { timeout: 1500 });
                    return;
                }

                window.setTimeout(function() {
                    assignQrAssets();
                }, 300);
            }

            function shouldUseAvatarFlip() {
                return !!(window.matchMedia && window.matchMedia('(hover: hover) and (pointer: fine)').matches);
            }

            function clearAvatarContactRevealTimer() {
                if (avatarContactRevealTimerId) {
                    window.clearTimeout(avatarContactRevealTimerId);
                    avatarContactRevealTimerId = 0;
                }
            }

            function waitForScrollToSettle(onSettled) {
                let lastScrollY = window.scrollY;
                let stableFrameCount = 0;

                const checkScrollStability = function() {
                    const currentScrollY = window.scrollY;

                    if (Math.abs(currentScrollY - lastScrollY) < 0.5) {
                        stableFrameCount += 1;
                    } else {
                        stableFrameCount = 0;
                        lastScrollY = currentScrollY;
                    }

                    if (stableFrameCount >= contactRevealScrollSettleFrames) {
                        onSettled();
                        return;
                    }

                    avatarContactRevealTimerId = window.setTimeout(function() {
                        requestAnimationFrame(checkScrollStability);
                    }, 16);
                };

                requestAnimationFrame(checkScrollStability);
            }

            function resetAvatarHoverTilt() {
                if (!avatarTrigger) {
                    return;
                }

                avatarTrigger.classList.remove('is-hover-active');
                avatarTrigger.style.setProperty('--avatar-hover-rotate-x', '0deg');
                avatarTrigger.style.setProperty('--avatar-hover-rotate-y', '0deg');
            }

            function updateAvatarHoverTilt(pointerClientX, pointerClientY) {
                if (!avatarTrigger || !shouldUseAvatarFlip()) {
                    resetAvatarHoverTilt();
                    return;
                }

                if (avatarProgrammaticSpinInProgress || root.classList.contains('hover-suppressed') || root.classList.contains('intro-loading') || root.classList.contains('intro-opening') || root.classList.contains('about-intro-playing')) {
                    resetAvatarHoverTilt();
                    return;
                }

                const avatarRect = avatarTrigger.getBoundingClientRect();

                if (!avatarRect.width || !avatarRect.height) {
                    resetAvatarHoverTilt();
                    return;
                }

                const centerX = avatarRect.left + avatarRect.width / 2;
                const centerY = avatarRect.top + avatarRect.height / 2;
                const rangeX = Math.max(avatarRect.width * 0.5, window.innerWidth * avatarHoverRangeViewportRatio * 0.5);
                const rangeY = Math.max(avatarRect.height * 0.5, window.innerHeight * avatarHoverRangeViewportRatio * 0.5);
                const normalizedX = (pointerClientX - centerX) / rangeX;
                const normalizedY = (pointerClientY - centerY) / rangeY;
                const distance = Math.sqrt((normalizedX * normalizedX) + (normalizedY * normalizedY));

                if (distance >= 1) {
                    resetAvatarHoverTilt();
                    return;
                }

                const proximity = 1 - distance;
                const rotateY = Math.max(-avatarHoverMaxTiltDegrees, Math.min(avatarHoverMaxTiltDegrees, -normalizedX * avatarHoverMaxTiltDegrees * proximity));
                const rotateX = Math.max(-avatarHoverMaxTiltDegrees, Math.min(avatarHoverMaxTiltDegrees, normalizedY * avatarHoverMaxTiltDegrees * proximity));

                avatarTrigger.classList.add('is-hover-active');
                avatarTrigger.style.setProperty('--avatar-hover-rotate-x', rotateX.toFixed(2) + 'deg');
                avatarTrigger.style.setProperty('--avatar-hover-rotate-y', rotateY.toFixed(2) + 'deg');
            }

            function setAvatarFlipped(isFlipped) {
                if (!avatarTrigger) {
                    return;
                }

                avatarTrigger.classList.toggle('is-flipped', isFlipped);
                avatarTrigger.setAttribute('aria-pressed', isFlipped ? 'true' : 'false');
                avatarTrigger.setAttribute('aria-label', isFlipped ? '收起微信二维码' : '显示微信二维码');
            }

            function buildAvatarCardTransform(rotateX, rotateY) {
                return 'rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg)';
            }

            function playAvatarContactRevealAnimation() {
                if (!avatarTrigger || !avatarCard) {
                    return;
                }

                warmQrModalAsset();
                resetAvatarHoverTilt();
                clearAvatarContactRevealTimer();

                if (avatarContactFlipAnimation) {
                    avatarContactFlipAnimation.cancel();
                    avatarContactFlipAnimation = null;
                }

                const wasFlipped = avatarTrigger.classList.contains('is-flipped');
                const startRotateY = wasFlipped ? 180 : 0;
                const targetRotateY = wasFlipped ? 540 : 180;

                avatarProgrammaticSpinInProgress = true;
                setAvatarFlipped(wasFlipped);

                if (typeof avatarCard.animate === 'function') {
                    avatarContactFlipAnimation = avatarCard.animate([
                        { transform: buildAvatarCardTransform(0, startRotateY) },
                        { transform: buildAvatarCardTransform(0, targetRotateY) }
                    ], {
                        duration: avatarContactFlipDuration,
                        easing: 'cubic-bezier(0.22, 0.76, 0.24, 1)',
                        fill: 'forwards'
                    });

                    avatarContactFlipAnimation.onfinish = function() {
                        const completedAnimation = avatarContactFlipAnimation;

                        setAvatarFlipped(true);
                        avatarContactFlipAnimation = null;
                        avatarProgrammaticSpinInProgress = false;

                        if (completedAnimation) {
                            completedAnimation.cancel();
                        }
                    };

                    avatarContactFlipAnimation.oncancel = function() {
                        avatarContactFlipAnimation = null;
                        avatarProgrammaticSpinInProgress = false;
                    };

                    return;
                }

                setAvatarFlipped(true);
                avatarProgrammaticSpinInProgress = false;
            }

            async function warmAvatarHoverState() {
                if (!avatarTrigger) {
                    return;
                }

                await new Promise(function(resolve) {
                    requestAnimationFrame(function() {
                        requestAnimationFrame(resolve);
                    });
                });

                avatarTrigger.getBoundingClientRect();
            }

            async function runStartupIntro() {
                const startupSteps = [
                    waitForVideo(aboutVideo),
                    waitForImage(aboutAvatarImage),
                    waitForFonts()
                ];
                let completedSteps = 0;
                const totalSteps = startupSteps.length;

                const trackedSteps = startupSteps.map(function(stepPromise) {
                    return Promise.resolve(stepPromise).finally(function() {
                        const completedIndex = completedSteps;
                        completedSteps += 1;

                        if (completedIndex < startupStepMilestones.length) {
                            baseLoaderProgress = startupStepMilestones[completedIndex];
                            setLoaderProgress(baseLoaderProgress);
                        }

                        if (completedSteps === totalSteps) {
                            stopLoaderFloat();
                        }
                    });

                await Promise.all(trackedSteps);

                if (startupTimedOut) {
                    return;
                }

                await warmAvatarHoverState();

                const readyElapsed = performance.now() - introBootTimestamp;
                const minimumVisibleDuration = readyElapsed <= quickReadyThreshold ? quickReadyMinimum : standardReadyMinimum;
                const remainingVisibleDuration = Math.max(0, minimumVisibleDuration - readyElapsed);

                if (remainingVisibleDuration > 0) {
                    await new Promise(function(resolve) {
                        window.setTimeout(resolve, remainingVisibleDuration);
                    });
                }

                if (startupTimedOut) {
                    return;
                }

                root.classList.remove('hover-prewarm');

                await new Promise(function(resolve) {
                    requestAnimationFrame(function() {
                        requestAnimationFrame(resolve);
                    });
                });

                if (startupTimedOut) {
                    return;
                }

                startupLoader.classList.add('is-complete');
                stopLoaderFloat();
                baseLoaderProgress = 1;
                targetLoaderProgress = 1;
                renderedLoaderProgress = 1;
                root.style.setProperty('--loader-progress-visual', '1');

                if (startupLoaderProgressText) {
                    startupLoaderProgressText.textContent = '100%';
                }

                await new Promise(function(resolve) {
                    requestAnimationFrame(function() {
                        requestAnimationFrame(resolve);
                    });
                });

                if (startupTimedOut) {
                    return;
                }

                startupLoader.classList.add('is-opening');
                root.classList.add('intro-opening');
                root.classList.add('about-intro-playing');

                await new Promise(function(resolve) {
                    window.setTimeout(resolve, startupRevealDuration);
                });

                if (startupTimedOut || !finishStartupPresentation()) {
                    return;
                }

                startupLoader.hidden = true;
                root.classList.add('intro-opened');
                root.classList.remove('intro-loading', 'intro-opening', 'intro-skip-complete');
                root.classList.remove('intro-prestart');
                warmQrModalAsset();
                armAvatarHoverAfterPointerMove();

                window.setTimeout(function() {
                    root.classList.remove('about-intro-playing');
                }, Math.max(0, aboutIntroDuration - startupRevealDuration));
            }

            function armAvatarHoverAfterPointerMove() {
                const hoverMediaQuery = window.matchMedia ? window.matchMedia('(hover: hover) and (pointer: fine)') : null;

                if (!hoverMediaQuery || !hoverMediaQuery.matches) {
                    root.classList.remove('hover-suppressed');
                    resetAvatarHoverTilt();
                    return;
                }

                const unlockHover = function(event) {
                    if (event.pointerType && event.pointerType !== 'mouse') {
                        return;
                    }

                    root.classList.remove('hover-suppressed');
                    window.removeEventListener('pointermove', unlockHover, true);
                };

                window.addEventListener('pointermove', unlockHover, true);
            }

            if (window.matchMedia && window.matchMedia('(hover: hover) and (pointer: fine)').matches) {
                window.addEventListener('pointermove', function(event) {
                    if (event.pointerType && event.pointerType !== 'mouse') {
                        return;
                    }

                    updateAvatarHoverTilt(event.clientX, event.clientY);
                });

                window.addEventListener('pointerleave', function() {
                    resetAvatarHoverTilt();
                });

                window.addEventListener('blur', function() {
                    resetAvatarHoverTilt();
                });
            }

            function normalizeWheelDelta(event) {
                if (event.deltaMode === WheelEvent.DOM_DELTA_LINE) {
                    return event.deltaY * 16;
                }

                if (event.deltaMode === WheelEvent.DOM_DELTA_PAGE) {
                    return event.deltaY * window.innerHeight * 0.9;
                }

                return event.deltaY;
            }

            if (shouldReturnToAbout) {
                sessionStorage.removeItem('returnToAbout');
                document.documentElement.style.scrollBehavior = 'auto';
                window.scrollTo(0, 0);
                window.addEventListener('load', function() {
                    window.scrollTo(0, 0);
                    requestAnimationFrame(function() {
                        document.documentElement.style.scrollBehavior = '';
                    });
                }, { once: true });
            } else {
                document.documentElement.style.scrollBehavior = 'auto';
                window.scrollTo(0, 0);
                window.addEventListener('load', function() {
                    window.scrollTo(0, 0);
                    requestAnimationFrame(function() {
                        document.documentElement.style.scrollBehavior = '';
                    });
                }, { once: true });
            }

            if (aboutVideo) {
                aboutVideo.muted = true;
                aboutVideo.defaultMuted = true;
                aboutVideo.playsInline = true;
                aboutVideo.setAttribute('playsinline', '');
                aboutVideo.setAttribute('webkit-playsinline', '');
                aboutVideo.setAttribute('preload', 'auto');

                const ensureBackgroundVideoPlayback = function() {
                    const playPromise = aboutVideo.play();

                    if (playPromise && typeof playPromise.catch === 'function') {
                        playPromise.catch(function() {
                            // Safari 在自动播放策略拒绝时会保留覆盖层；静音并等待下一次可播放事件重试。
                        });
                    }
                };

                aboutVideo.addEventListener('loadeddata', ensureBackgroundVideoPlayback, { once: true });
                window.addEventListener('pageshow', ensureBackgroundVideoPlayback);
                ensureBackgroundVideoPlayback();
            }

            runStartupIntro().catch(function() {
                stopLoaderFloat();
                finalizeStartupWithoutAnimation();
            });

            window.addEventListener('wheel', function(event) {
                if (event.ctrlKey || Math.abs(event.deltaY) <= Math.abs(event.deltaX) || !qrModal.hidden) {
                    return;
                }

                event.preventDefault();
                window.scrollBy(0, normalizeWheelDelta(event) * wheelScrollFactor);
            }, { passive: false });

            function openQrModal() {
                warmQrModalAsset();
                qrModal.hidden = false;
                qrModal.setAttribute('aria-hidden', 'false');
            }

            function closeQrModal() {
                qrModal.hidden = true;
                qrModal.setAttribute('aria-hidden', 'true');
            }

            avatarTrigger.addEventListener('click', function() {
                if (avatarProgrammaticSpinInProgress) {
                    return;
                }

                warmQrModalAsset();

                if (shouldUseAvatarFlip()) {
                    setAvatarFlipped(!avatarTrigger.classList.contains('is-flipped'));
                    return;
                }

                openQrModal();
            });
            qrModalClose.addEventListener('click', closeQrModal);
            if (contactRevealButton && aboutSection) {
                contactRevealButton.addEventListener('click', function(event) {
                    event.preventDefault();

                    aboutSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    clearAvatarContactRevealTimer();
                    waitForScrollToSettle(function() {
                        avatarContactRevealTimerId = 0;
                        playAvatarContactRevealAnimation();
                    });
                });
            }
            qrModal.addEventListener('click', function(event) {
                if (event.target === qrModal) {
                    closeQrModal();
                }
            });
            document.addEventListener('keydown', function(event) {
                if (event.key === 'Escape' && avatarTrigger.classList.contains('is-flipped')) {
                    setAvatarFlipped(false);
                }

                if (event.key === 'Escape' && !qrModal.hidden) {
                    closeQrModal();
                }
            });
        </script>
    </body>
</html>
